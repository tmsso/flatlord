name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # The real Supabase Postgres image, not a bare postgres container: our
      # tests depend on the real `auth` schema and RLS roles (auth.users
      # insert, `set local role authenticated`), which come from Supabase's
      # own bootstrap SQL — applied at the Postgres level regardless of
      # which other services are running. `db start` also applies every
      # file in supabase/migrations to the fresh database automatically,
      # so this exercises the exact same SQL a new cloud project would get.
      # Runs once per job on a throwaway GitHub-hosted runner — nothing
      # persists between runs, nothing to clean up, no cloud project or
      # secrets involved.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      # `supabase db start` brings up only the Postgres container (tests
      # connect straight to it via SUPABASE_DB_URL, not through the REST/
      # gateway API) and skips the rest of the stack entirely — including
      # Kong, so there's no gateway-readiness health check to satisfy. The
      # earlier attempt at trimming `supabase start` via --exclude broke on
      # exactly that: excluding kong left nothing on port 54321 for the
      # CLI's own built-in readiness probe, so it timed out and tore the
      # stack down even though migrations had already applied cleanly.
      - name: Start local Supabase database
        run: supabase db start

      - name: Seed demo data
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: pnpm exec tsx seed/seed.demo.ts

      - name: Run tests
        env:
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: pnpm exec vitest run
